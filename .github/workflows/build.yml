name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore: ["**.md"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Linux (binaire nu) + Windows via matrice.
  build:
    name: ${{ matrix.out }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            out: go_extract-linux-amd64
            ldflags: ""
          - os: windows-latest
            out: go_extract-windows-amd64.exe
            ldflags: "-H=windowsgui"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Dépendances système (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libxkbcommon-dev pkg-config

      - name: MinGW (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc
          path-type: inherit

      - name: Test crypto (indépendant de la GUI)
        run: go test ./internal/rxcrypto/...

      - name: Build
        env:
          CGO_ENABLED: "1"
        run: go build -trimpath -ldflags "${{ matrix.ldflags }}" -o "${{ matrix.out }}" .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: ${{ matrix.out }}
          if-no-files-found: error

  # macOS : un seul runner (Apple Silicon) construit arm64 (natif) ET amd64
  # (cross-compilation via `clang -arch x86_64`).
  build-macos:
    name: macos (arm64 + amd64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Test crypto
        run: go test ./internal/rxcrypto/...
      - name: Build arm64 (natif)
        env: { CGO_ENABLED: "1", GOARCH: arm64 }
        run: go build -trimpath -o go_extract-macos-arm64 .
      - name: Build amd64 (cross)
        env:
          CGO_ENABLED: "1"
          GOARCH: amd64
          CC: "clang -arch x86_64"
          CXX: "clang++ -arch x86_64"
        run: go build -trimpath -o go_extract-macos-amd64 .
      - uses: actions/upload-artifact@v4
        with: { name: go_extract-macos-arm64, path: go_extract-macos-arm64, if-no-files-found: error }
      - uses: actions/upload-artifact@v4
        with: { name: go_extract-macos-amd64, path: go_extract-macos-amd64, if-no-files-found: error }

  # AppImage Linux : un SEUL fichier qui EMBARQUE les bibliothèques OpenGL/X11,
  # donc lançable sur une machine sans ces libs (le cas `libGL.so.1` manquant).
  # Construit sur Ubuntu 22.04 (glibc plus ancienne = compatibilité plus large).
  appimage:
    name: go_extract-linux-amd64.AppImage
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Dépendances système
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libxkbcommon-dev pkg-config \
            imagemagick fuse libfuse2 file wget
      - name: Test crypto
        run: go test ./internal/rxcrypto/...
      - name: Build binaire
        env: { CGO_ENABLED: "1" }
        run: go build -trimpath -o go_extract .
      - name: Assembler l'AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp go_extract AppDir/usr/bin/go_extract
          cat > AppDir/go_extract.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=go_extract
          Comment=Déchiffrement des archives de réversibilité Monkey Factory
          Exec=go_extract
          Icon=go_extract
          Categories=Utility;
          Terminal=false
          EOF
          convert -size 256x256 xc:'#1f6feb' AppDir/go_extract.png
      - name: Construire l'AppImage (linuxdeploy)
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/go_extract \
            --desktop-file AppDir/go_extract.desktop \
            --icon-file AppDir/go_extract.png \
            --output appimage
          mv go_extract*.AppImage go_extract-linux-amd64.AppImage
          chmod +x go_extract-linux-amd64.AppImage
          file go_extract-linux-amd64.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: go_extract-linux-amd64.AppImage
          path: go_extract-linux-amd64.AppImage
          if-no-files-found: error

  # Publication automatique d'une Release quand un tag vX.Y.Z est poussé.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, build-macos, appimage]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Liste des binaires
        run: ls -lR dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
